<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
        // GitHub Pages redirect for hash-based routing
        const base = '/SkillBridge/';
        const pathname = window.location.pathname;
        const search = window.location.search;
        const hash = window.location.hash;

        // Remove the base path prefix
        let path = pathname;
        if (pathname.startsWith(base)) {
            path = pathname.slice(base.length);
        }

        // Remove trailing slashes and index.html
        path = path.replace(/\/$/, '').replace(/\/index\.html$/, '');
        if (!path || path === '') {
            path = '/login';
        }

        // Ensure path starts with /
        if (!path.startsWith('/')) {
            path = '/' + path;
        }

        // Create the target hash URL
        const target = base + '#' + path + search + hash;
        window.location.replace(target);
    </script>
</head>

<body>
    <p>Redirecting to the app...</p>
</body>

</html>
